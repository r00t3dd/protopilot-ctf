<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ProtoPilot Login</title>
  <style>
    body { font-family: "Segoe UI", Tahoma, sans-serif; background: #0b1220; color: #e2e8f0; margin: 0; }
    .wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .card { background: #111a2e; border: 1px solid #1f2a44; width: 100%; max-width: 420px; border-radius: 14px; box-shadow: 0 20px 40px rgba(2,6,23,.45); padding: 2rem; }
    h1 { margin: 0 0 .5rem; font-size: 1.5rem; }
    .tagline { margin: 0 0 1.5rem; color: #94a3b8; font-size: .95rem; }
    label { display: block; margin-bottom: .3rem; font-size: .92rem; }
    input { width: 100%; box-sizing: border-box; padding: .75rem; background: #0f172a; color: #e2e8f0; border: 1px solid #334155; border-radius: 8px; margin-bottom: 1rem; }
    input::placeholder { color: #64748b; }
    button { width: 100%; padding: .8rem; border: 0; border-radius: 8px; background: #0b5fff; color: #fff; font-weight: 600; cursor: pointer; }
    .error { background: #3f1420; border: 1px solid #9f1239; color: #fecdd3; padding: .7rem; border-radius: 8px; margin-bottom: 1rem; }
    .meta { margin-top: 1rem; color: #94a3b8; font-size: .82rem; text-align: center; }
    .meta a { color: #0b5fff; text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>ProtoPilot</h1>
      <p class="tagline">ProtoPilot helps teams automate workflows through fast, internal gRPC-powered rule testing. What could go wrong?</p>
      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}
      <form method="post" action="/login">
        <label for="email">Email</label>
        <input id="email" name="email" type="text" placeholder="name@protopilot.local" required>

        <label for="password">Password</label>
        <input id="password" name="password" type="password" placeholder="password" required>

        <button type="submit">Sign In</button>
      </form>
      <p class="meta"><a href="/team">Team directory</a></p>
    </div>
  </div>
</body>
</html>
